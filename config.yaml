# ============================================================
#  Конфигурация агрегатора заказов на пошив
# ============================================================

filters:
  min_quantity: 50
  regions:
    - "*"
  include_keywords:
    - пошив
    - швейн
    - футболк
    - свитшот
    - лонгслив
    - худи
    - толстовк
    - простын
    - полотенц
    - постельн
    - текстиль
    - трикотаж
    - спецодежд
    - форменн
    - изготовление одежды
    - тканев
  exclude_keywords:
    - химчистк
    - ремонт одежды
    - аренда
    - стирк
    - утилизац

# ---- Авто-архив устаревших карточек (выполняется после каждого сбора) ----
cleanup:
  max_age_days: 30            # старше N дней (по дате публикации / сбора) -> в архив
  archive_past_deadline: true # с прошедшим сроком подачи -> в архив

# ============================================================
#  Источники
# ============================================================
sources:

  # ---- Госзакупки (публичный поиск zakupki.gov.ru, БЕЗ токена) — РАБОТАЕТ ----
  - id: zakupki_search
    name: "Госзакупки (zakupki.gov.ru)"
    type: zakupki_search
    enabled: true
    fz44: true
    fz223: true
    render_js: true
    use_proxy: true            # ходить через PROXY_URL из .env
    pages: 2
    records_per_page: "_50"
    queries:
      - пошив
      - футболки
      - свитшот
      - лонгслив
      - худи
      - трикотаж
      - постельное бельё
      - полотенца
      - спецодежда
      - форменная одежда
    selectors:
      card: "div.search-registry-entry-block"
      number_link: ".registry-entry__header-mid__number a"
      object: ".registry-entry__body-value"
      customer: ".registry-entry__body-href"
      price: ".price-block__value"

  # ---- Портал поставщиков Москвы (zakupki.mos.ru) — ПРОВЕРИТЬ СЕЛЕКТОРЫ ----
  # Включить (enabled: true) после проверки на сервере: домен доступен из РФ,
  # а CSS-селекторы карточек надо сверить в DevTools (вёрстка может отличаться).
  - id: zakupki_mos
    name: "Портал поставщиков Москвы"
    type: mos_portal
    enabled: true
    url: "https://zakupki.mos.ru/auction/search"
    render_js: true
    use_proxy: true
    queries:
      - пошив
      - футболки
      - трикотаж
      - постельное бельё
      - спецодежда
    selectors:
      card: ".card, .search-results__item, [data-test='auction-card']"
      title: ".card__title, .auction-card__name, h3"
      price: ".card__price, .auction-card__price"
      link: "a@href"

  # ---- ЕИС 44-ФЗ через официальный сервис getDocsIP (нужен токен) ----
  - id: eis
    name: "ЕИС getDocsIP"
    type: eis_soap
    enabled: false
    use_proxy: true
    service_url: "https://int44.zakupki.gov.ru/eis-integration/services/getDocsIP"
    ws_namespace: "http://zakupki.gov.ru/fz44/get-docs-ip/ws"
    subsystem_type: "PRIZ"
    document_types:
      - epNotificationEF2020
      - epNotificationOK2020
      - epNotificationZK2020
    regions_codes: ["77", "78", "50"]
    days_back: 1

  # ---- Швейные площадки (парсинг публичных страниц; проверить селекторы) ----
  - id: poshivrus
    name: "Пошив.рус"
    type: html
    enabled: false
    url: "https://xn--b1agjdgq7e.xn--80asehdb/Orders"
    render_js: true
    selectors:
      card: ".order-card, .order, [data-order]"
      title: ".order-title, h3, .title"
      description: ".order-desc, .description, p"
      quantity: ".order-qty, .quantity"
      region: ".order-region, .region, .city"
      link: "a@href"
      contact: ".order-contact, .contact, .phone"

  - id: shveinik
    name: "Швейник.онлайн"
    type: html
    enabled: false
    url: "https://xn--b1alrd0c.xn--p1acf/ads/ishchu-proizvoditelya-2"
    render_js: true
    selectors:
      card: ".ad-card, .advert, .ad"
      title: ".ad-title, h3, .title"
      description: ".ad-text, .description, p"
      quantity: ".ad-qty, .quantity"
      region: ".ad-region, .region, .city"
      link: "a@href"
      contact: ".ad-contact, .contact, .phone"

  # ---- Telegram-каналы/боты (нужны TG_API_ID / TG_API_HASH) ----
  - id: telegram
    name: "Telegram (@poshivrus)"
    type: telegram
    enabled: false

  # ---- ЭТП (заглушки, включать по мере доступов) ----
  - id: sberbank_ast
    name: "Сбербанк-АСТ"
    type: etp
    enabled: false
    url: "https://www.sberbank-ast.ru"
  - id: roseltorg
    name: "Росэлторг"
    type: etp
    enabled: false
    url: "https://www.roseltorg.ru"
  - id: fabrikant
    name: "Фабрикант"
    type: etp
    enabled: false
    url: "https://www.fabrikant.ru"
  # ---- Закупки Московской области (market.mosreg.ru) — ПРОВЕРИТЬ СЕЛЕКТОРЫ ----
  - id: market_mosreg
    name: "Закупки Московской области"
    type: mos_portal
    enabled: true
    url: "https://market.mosreg.ru/Trade/View"
    query_param: "text"
    region: "Московская область"
    render_js: true
    use_proxy: true
    queries: [пошив, футболки, трикотаж, спецодежда, постельное бельё]
    selectors:
      card: ".trade-card, .card, .search-result-item"
      title: ".trade-card__title, .card__title, h3, a"
      price: ".trade-card__price, .price"
      link: "a@href"
